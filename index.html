arate\" role=\"presentation\"><tbody><tr><td style=\"padding-top:0;padding-bottom:0;padding-right:0;padding-left:0;border:0;border-radius:0\" valign=\"top\" id=\"b42\"><table width=\"100%\" style=\"border:0;background-color:transparent;border-radius:0;border-collapse:separate\"><tbody><tr><td style=\"padding-left:36px;padding-right:36px;padding-top:12px;padding-bottom:12px\" class=\"mceTextBlockContainer\"><div data-block-id=\"42\" class=\"mceText\" id=\"d42\" style=\"width:100%\"><p><strong><span style=\"color:#b50000;\"><span style=\"font-size: 18px\"><span style=\"font-family: 'Helvetica Neue', Helvetica, Arial, Verdana, sans-serif\">Gmail:<\/span><\/span><\/span><\/strong><span style=\"color:#b50000;\"><span style=\"font-size: 18px\"><span style=\"font-family: 'Helvetica Neue', Helvetica, Arial, Verdana, sans-serif\"> <\/span><\/span><\/span><span style=\"color:#151a30;\"><span style=\"font-size: 18px\"><span style=\"font-family: 'Helvetica Neue', Helvetica, Arial, Verdana, sans-serif\">Make sure we are in your <\/span><\/span><\/span><strong><span style=\"color:#151a30;\"><span style=\"font-size: 18px\"><span style=\"font-family: 'Helvetica Neue', Helvetica, Arial, Verdana, sans-serif\">PRIMARY INBOX.<\/span><\/span><\/span><\/strong><\/p><ul><li style=\"color: #151a30;\"><p><em><strong><span style=\"color:#151a30;\"><span style=\"font-size: 18px\"><span style=\"font-family: 'Helvetica Neue', Helvetica, Arial, Verdana, sans-serif\">On your phone?<\/span><\/span><\/span><\/strong><\/em><span style=\"color:#151a30;\"><span style=\"font-size: 18px\"><span style=\"font-family: 'Helvetica Neue', Helvetica, Arial, Verdana, sans-serif\"> click the 3 dots in the top right corner, select “Move to”, then “Primary.”<\/span><\/span><\/span><\/p><\/li><li style=\"color: #151a30;\"><p><em><strong><span style=\"color:#151a30;\"><span style=\"font-size: 18px\"><span style=\"font-family: 'Helvetica Neue', Helvetica, Arial, Verdana, sans-serif\">On a computer?<\/span><\/span><\/span><\/strong><\/em><span style=\"color:#151a30;\"><span style=\"font-size: 18px\"><span style=\"font-family: 'Helvetica Neue', Helvetica, Arial, Verdana, sans-serif\"> Next to our name (The White House) , a window will pop-up to allow you to select the “Add to contacts” icon and save us to your Contacts list.<\/span><\/span><\/span><\/p><p><br /><\/p><\/li><\/ul><p style=\"line-height: 0; mso-line-height-alt: 0%;\"><br /><\/p><p class=\"mcePastedContent\"><strong><span style=\"color:#b50000;\"><span style=\"font-size: 18px\"><span style=\"font-family: 'Helvetica Neue', Helvetica, Arial, Verdana, sans-serif\"><span style=\"background-color: rgb(255, 255, 255)\">Yahoo:<\/span><\/span><\/span><\/span><\/strong><span style=\"color:#151a30;\"><span style=\"font-size: 18px\"><span style=\"font-family: 'Helvetica Neue', Helvetica, Arial, Verdana, sans-serif\"><span style=\"background-color: rgb(255, 255, 255)\"> Make sure our emails land in your Inbox.<\/span><\/span><\/span><\/span><\/p><ul><li class=\"mcePastedContent\" style=\"color: #151a30;\"><p class=\"mcePastedContent\"><em><strong><span style=\"color:#151a30;\"><span style=\"font-size: 18px\"><span style=\"font-family: 'Helvetica Neue', Helvetica, Arial, Verdana, sans-serif\"><span style=\"background-color: rgb(255, 255, 255)\">On your phone or computer?<\/span><\/span><\/span><\/span><\/strong><\/em><span style=\"color:#151a30;\"><span style=\"font-size: 18px\"><span style=\"font-family: 'Helvetica Neue', Helvetica, Arial, Verdana, sans-serif\"><span style=\"background-color: rgb(255, 255, 255)\"> Open one of our emails, tap or click the three dots / More menu, then select Move → Inbox.<\/span><\/span><\/span><\/span><\/p><\/li><li class=\"mcePastedContent\" style=\"color: #151a30;\"><p class=\"mcePastedContent\"><em><strong><span style=\"color:#151a30;\"><span style=\"font-size: 18px\"><span style=\"font-family: 'Helvetica Neue', Helvetica, Arial, Verdana, sans-serif\"><span style=\"background-color: rgb(255, 2 05e74f-99e6-4ba2-bc61-ca9c6831025f}{198}\" paraid=\"569869066\">Thanks for subscribing to our&nbsp;newsletters.&nbsp;We&rsquo;re&nbsp;so glad&nbsp;you&rsquo;re&nbsp;here and&nbsp;look forward to sharing&nbsp;the Center&rsquo;s <a href=\"https://pewresearch.us1.list-manage.com/track/click?u=434f5d1199912232d416897e4&id=073a8976b6&e=939588bbb8\" rel=\"noreferrer noopener\" target=\"_blank\" style=\"text-decoration: underline;color: #346EAD;\">latest research<\/a> with you.&nbsp;<br>\n&nbsp;<br>\n<strong>What can you expect?<\/strong>&nbsp;These&nbsp;newsletters&nbsp;put&nbsp;fresh findings&nbsp;right at your fingertips to&nbsp;put the news of the day in context.&nbsp;We hope our work helps you feel informed when making decisions in your daily life.&nbsp;&nbsp;&nbsp;<\/p>\n\n<p paraeid=\"{db08e3c3-e5b8-46d1-a8b8-4906de2f953a}{17}\" paraid=\"1055034685\"><strong>What&nbsp;topics&nbsp;are you curious about?<\/strong>&nbsp;Check out our other&nbsp;newsletter products&nbsp;<a href=\"https://pewresearch.us1.list-manage.com/track/click?u=434f5d1199912232d416897e4&id=0d35904548&e=939588bbb8\" rel=\"noreferrer noopener\" target=\"_blank\" style=\"text-decoration: underline;color: #346EAD;\">on our website<\/a>.&nbsp;<br>\n<br>\n<strong>What&rsquo;s next?<\/strong>&nbsp;In addition to your newsletters,&nbsp;we&rsquo;re&nbsp;going to send you a few bonus emails over the next few days introducing you to our team and our research methods. We hope they help you understand the work that goes into our research findings.&nbsp;<br>\n&nbsp;<br>\nThanks, and happy reading!&nbsp;<br>\n&nbsp;<br>\nYour friends at Pew Research Center&nbsp;<\/p>\n\n<p paraeid=\"{db08e3c3-e5b8-46d1-a8b8-4906de2f953a}{67}\" paraid=\"2036512453\">&nbsp;<\/p>\n\n<p paraeid=\"{db08e3c3-e5b8-46d1-a8b8-4906de2f953a}{71}\" paraid=\"908024257\">P.S. (which stands for&nbsp;&ldquo;postscript&rdquo;&nbsp;&ndash;&nbsp;if you&nbsp;didn&rsquo;t&nbsp;know!)&nbsp;&nbsp;<\/p>\n\n<p paraeid=\"{db08e3c3-e5b8-46d1-a8b8-4906de2f9 const EMBED = true;
let state = { q: "", topic: null, source: null, sort: "new" };

const $ = (s) => document.querySelector(s);
const feed = $("#feed");

// 建立側邊篩選
function buildFilters() {
  const topics = {}, sources = {};
  DATA.forEach(e => {
    topics[e.topic] = (topics[e.topic]||0)+1;
    sources[e.source] = (sources[e.source]||0)+1;
  });
  renderFilterGroup("#topicFilters", topics, "topic");
  renderFilterGroup("#sourceFilters", sources, "source");
}
function renderFilterGroup(sel, counts, key) {
  const box = $(sel);
  const all = document.createElement("button");
  all.className = "filter active"; all.dataset.key = key; all.dataset.val = "";
  all.innerHTML = `<span>全部</span><span class="n">${Object.values(counts).reduce((a,b)=>a+b,0)}</span>`;
  box.appendChild(all);
  Object.entries(counts).sort((a,b)=>b[1]-a[1]).forEach(([name, n]) => {
    const b = document.createElement("button");
    b.className = "filter"; b.dataset.key = key; b.dataset.val = name;
    b.innerHTML = `<span>${escapeHtml(name)}</span><span class="n">${n}</span>`;
    box.appendChild(b);
  });
  box.addEventListener("click", (ev) => {
    const btn = ev.target.closest(".filter"); if (!btn) return;
    state[key] = btn.dataset.val || null;
    box.querySelectorAll(".filter").forEach(x => x.classList.remove("active"));
    btn.classList.add("active");
    render();
  });
}

function escapeHtml(s) {
  return (s||"").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
}

function filtered() {
  let out = DATA.filter(e => {
    if (state.topic && e.topic !== state.topic) return false;
    if (state.source && e.source !== state.source) return false;
    if (state.q) {
      const hay = (e.subject + " " + e.source + " " + e.from_email + " " + e.excerpt).toLowerCase();
      if (!hay.includes(state.q.toLowerCase())) return false;
    }
    return true;
  });
  const s = state.sort;
  out.sort((a,b) => {
    if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
    if (s === "new") return b.date_sort - a.date_sort;
    if (s === "old") return a.date_sort - b.date_sort;
    if (s === "az")  return a.subject.localeCompare(b.subject, "zh-Hant");
    return 0;
  });
  return out;
}

function render() {
  const items = filtered();
  feed.innerHTML = "";
  if (!items.length) {
    feed.innerHTML = `<div class="empty">沒有符合條件的卷宗。<br>試著放寬搜尋或切換篩選。</div>`;
    return;
  }
  items.forEach((e, i) => {
    const art = document.createElement("article");
    art.className = "entry";
    art.style.animationDelay = Math.min(i * 0.04, 0.4) + "s";
    art.innerHTML = `
      <div class="topline">
        <span class="tag">${escapeHtml(e.topic)}</span>
        ${e.pinned ? '<span class="pin">★ 置頂</span>' : ''}
      </div>
      <h2>${escapeHtml(e.subject)}</h2>
      <div class="meta">
        <span class="src">${escapeHtml(e.source)}</span>
        <span class="dot"></span><span>${escapeHtml(e.date_label)}</span>
        <span class="dot"></span><span>約 ${e.minutes} 分鐘</span>
        ${e.has_body ? '' : '<span class="dot"></span><span class="nobody">僅存目</span>'}
      </div>
      <p class="excerpt">${escapeHtml(e.excerpt || "（此封信件沒有可預覽的內文）")}</p>
      ${e.has_body ? '<span class="more">閱讀全文</span>' : ''}`;
    art.addEventListener("click", () => openReader(e));
    feed.appendChild(art);
  });
}

// 閱讀面板
const readerBg = $("#readerBg"), reader = $("#reader");
function openReader(e) {
  $("#rTag").textContent = e.topic;
  $("#rTitle").textContent = e.subject;
  $("#rMeta").innerHTML =
    `<span>${escapeHtml(e.source)}</span>` +
    (e.from_email ? `<span>${escapeHtml(e.from_email)}</span>` : "") +
    `<span>${escapeHtml(e.date_label)}</span>`;
  const body = $("#rBody");
  if (!e.has_body) {
    body.innerHTML = `<div class="fallback">這封信件目前只有索引資料，沒有保存完整內文。</div>`;
  } else if (EMBED) {
    const f = document.createElement("iframe");
    f.setAttribute("sandbox", "allow-popups allow-popups-to-escape-sandbox");
    f.srcdoc = e.html;
    body.innerHTML = ""; body.appendChild(f);
  } else {
    const f = document.createElement("iframe");
    f.setAttribute("sandbox", "allow-popups allow-popups-to-escape-sandbox");
    f.src = e.rel_path;
    body.innerHTML = ""; body.appendChild(f);
  }
  readerBg.classList.add("open");
  reader.classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeReader() {
  readerBg.classList.remove("open");
  reader.classList.remove("open");
  document.body.style.overflow = "";
  setTimeout(() => { $("#rBody").innerHTML = ""; }, 420);
}
readerBg.addEventListener("click", closeReader);
$("#closeReader").addEventListener("click", closeReader);
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeReader(); });

$("#q").addEventListener("input", (e) => { state.q = e.target.value; render(); });
$("#sort").addEventListener("change", (e) => { state.sort = e.target.value; render(); });

buildFilters();
render();
</script>
