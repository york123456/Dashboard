 <p style=\"margin: 10px 0;padding: 0;mso-line-height-rule: exactly;-ms-text-size-adjust: 100%;-webkit-text-size-adjust: 100%;color: #000000;font-family: Helvetica;font-size: 16px;line-height: 150%;text-align: left;\">但雖然如此，還是必須承認，有很多事情我們從來沒聽說。<\/p>\n    <p style=\"margin: 10px 0;padding: 0;mso-line-height-rule: exactly;-ms-text-size-adjust: 100%;-webkit-text-size-adjust: 100%;color: #000000;font-family: Helvetica;font-size: 16px;line-height: 150%;text-align: left;\">去年下半年開始，自己就經歷不少這些「哇，我怎麼從來都不知道？」的時刻。<\/p>\n    <p style=\"margin: 10px 0;padding: 0;mso-line-height-rule: exactly;-ms-text-size-adjust: 100%;-webkit-text-size-adjust: 100%;color: #000000;font-family: Helvetica;font-size: 16px;line-height: 150%;text-align: left;\">例如因為有機會進入不同政府部門拜訪或提供一些意見，經過真正的討論與協作之後才發現，無論中央或地方單位、不管在台灣哪個地方，都有認真用心的公務員們令人驚豔的努力成果。不見得全部都是高超的 AI 技術，但絕對都是直接對民眾有正面影響的政策與作為。<\/p>\n      <p style=\"margin: 10px 0;padding: 0;mso-line-height-rule: exactly;-ms-text-size-adjust: 100%;-webkit-text-size-adjust: 100%;color: #000000;font-family: Helvetica;font-size: 16px;line-height: 150%;text-align: left;\">政府單位的限制很多、也有些公務員心態極度保守。但同樣的，也有些人在這種困難重重的環境下，用心，尋找各種可能的出路。例如雲林縣不走政府部門開標案的傳統方式，和<a href=\"https://read.edm.aif.tw/c/eJw8z82OgyAUxfGngR3mcvFzwWIy6ms0CLeWDKBBrOnbT5p0Znv-OYuf03Q3SipOWnbd0PQ9DMgf2mE72L5pWqsa2y8LwCKNhUXJe6scOO41ArbQYA0IUmElq4Vhh9MwzwDN9yjbdpo6hh2rgVysjL9X5eJBP0rZD6a-GM4MZ3IrfRrD-bFdwnhBcd8uyuTE60zBJ1E2cUSTi1i3J-VkkqX3Xc1nibdjO7MlpsZJROMDw_a9RnL-jEyN4QynCD79fII1cTd-TUyNfwQedY0dwNANPGtrXxKxZjWse44mmZXyfi7B22rLKy__8lui6whUCuWDPzX-BgAA__82ymYX\" style=\"color: #c48e27; text-decoration: underline\">企業直接協作<\/a>；數位發展部發佈<a href=\"https://read.edm.aif.tw/c/eJw8z0tqwzAUheHVSDMb-Up-aKBBqW3oKoIeN46opBg9GrL7Ekg7PT8c-JzCq-YDp6iGeZbjsjAJ9KbYYuxgxTIZaeTEJ7M4oeUoUTCjr3ykXgGDiY0gGLCBQz_0hsAMm9x3xsbPdZimbZsJzEQwdLHX_trXBw3qVutZCP8gsBPY0R34bgR27buv5Fqp-dlVHTDVzt7jiRWTfXZH8w6DT1i6jAF1wdcH31uNl3Jv2SLh69ZF7QOB6bVGdL5FwtfQQuuCT9_vYHU8tT8S4eufg0YlYGZMzpJmZe1zABBEsOPMUSd9YD6bCd7293zQ-s-_JHyUgLViLvRHwW8AAAD__3EeaBw\" style=\"color: #c48e27; text-decoration: underline\"> AI 人才指引更新版<\/a>，同時希望帶動 AI 教育產業發展。<\/p>\n      <p style=\"margin: 10px 0;padding: 0;mso-line-height-rule: exactly;-ms-text-size-adjust: 100%;-webkit-text-size-adjust: 100%;color: #000000;font-family: Helvetica;font-size: 16px;line-height: 150%;text-align: left;\">其實也不只政府部門。前兩天在一場會議中，一位教授說：「公部門、醫療跟教育，這三個領域不能沒有人才啊，」她說的是，必須在人才發展極為不均的現況下，想辦法改變。例如，有零售業、傳統產業的經營者帶著員工自行開發 AI 工具，徹底更新組織流程同時，也讓員工大感振奮，對公司的向心力隨之大增。<\/p>\n  <p style=\"margin: 10px 0;padding: 0;mso-line-height-rule: exactly;-ms-text-size-adjust: 100%;-webkit-text-size-adjust: 100%;color: #000000;font-family: Helvetica;font-size: 16px;line-height: 150%;text-align: left;\">野地裡開出一朵朵的花，每次聽到類似分享，眼前彷彿浮現這樣的景象。跟各位分享本週電子報，接下來即將迎接台北國際電腦展 COMPUTEX 2026，共同期待初夏繁花盛開。<\/p>\n<p style=\"margin: 10px 0;padding: 0;mso-line-height-rule: exactly;color: #000000;font-family: Helvetica;font-size: 16px;line-height: 150%;text-align: right;\">人工智慧科技基金會執行長 溫怡玲<\/p>\n <\/td> <\/tr> <\/tbody> <\/table> <\/td> <\/tr> <\/tbody> <\/table> <table border=\"0\" cellpadding=\"0\" cellspacing=\"0\" width=\"100%\" style=\"table-layout: fixed !important;\"><tbody><tr><td style=\"padding: 30px 18px;\"><table border=\"0\" cellpadding=\"0\" cellspacing=\"0\" width=\"100%\" style=\"border-top: 3px solid #1c3a50;\"><tbody><tr><td><span><\/span><\/td><\/tr><\/tbody><\/table><\/td><\/tr><\/tbody><\/table> <table border=\"0\" cellpadding=\"0\" cellspacing=\"0\" width=\"100%\"> <tbody> <tr> <td style=\"padding: 9px;\"> <table align=\"left\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"width:100%;\"> <tbody> <tr> <td style=\"padding: 0 9px;font-family: Helvetica;line-height: 150%;\"> <h1 style=\"font-size: 18px;font-weight: 400;\">本期目錄<\/h1> <ul><li style=\"line-height: 30px\"><a href=\"https://read.edm.aif.tw/c/eJw8z8GuoyAUxvGngZ0GDgp1wWIy6ms0Rzi1JIIEsU7fftKb5m6_f77Fz1t6oJKKk5XGDP3tJgbgT-sfSnulFpRAPdzQSXQatZYKvXHLwIMFAVr00AkQUkEr24WBgWmYZyH6v6PUepoMA8M6QT62GB5tvfhmn7Xmg6k_DGYGM_mVvo3B_NyvBkNDMe8XF style=\"padding: 0 9px; word-break: break-word; color: #000000; font-family: Helvetica; font-size: 16px; line-height: 150%;\" width=\"564\">\n                                        <h1 style=\"font-size: 24px; font-weight: bold; line-height: 150%;\"><strong>沒錢沒資源，農業大縣如何靠「技術治理」走出一條彎道超車的路<\/strong><\/h1>\n                                        <p style=\"margin: 10px 0; line-height: 150%;\">在台灣的數位發展版圖中，雲林縣作為典型的傳統農業大縣，在直覺上並非發展 AI 的優先區位。然而，這種深刻的「數位反差」反而孕育了轉型的強烈動能。正如雲林縣政府計畫處所觀察到的，正因為「資源不足」，迫使縣府必須在治理邏輯上進行根本改變。<\/p>\n                                    <\/td>\n                                <\/tr>\n                            <\/tbody>\n                        <\/table>\n                    <\/td>\n                <\/tr>\n            <\/tbody>\n        <\/table>\n        <table border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-collapse: separate !important; border-radius: 15px; background-color: #f17205; width: 120px; margin-left: 9px;\">\n            <tbody>\n                <tr>\n                    <td align=\"center\" valign=\"middle\" style=\"font-family: Arial; font-size: 16px; padding: 0;\">\n                        <a class=\"mcnButton\" title=\"閱讀更多\" href=\"https://read.edm.aif.tw/c/eJw8z8GuoyAUxvGngZ3meFDRBYvJqK_RnMKpJREkiHX69pMmvXf7_fMtfs7wg1SjJJtG67EbBhhRPo21PDg1MiI8rAWrqbOk3dDCnfrBKukNAvbQYQsIjcK6qe8CNc7jsgB0f6em7-dZC9SiBXahJv-oyyU38ywlHUL9EbgIXNit_G0Cl-d-VeQrDmm_OLOr3mfcfKzKXh2BcqnW_cU5UrT8uavlLOF27Ge2LNQ0V4H8JrD_rIGdP4NQEydKnG-F_5VvshQS-TUKNf0gZDAtaoBRjzIba98NYitaWFMOFGnlnM775m2951WWX_st8nVsXArnQ74M_g8AAP__5hJntw\" target=\"_blank\" style=\"font-weight: normal; text-decoration: none; color: #FFFFFF; display: block; padding: 12px 20px; width: 100%; box-sizing: border-box;\">閱讀更多<\/a>\n                    <\/td>\n                <\/tr>\n            <\/tbody>\n        <\/table>\n            <table border=\"0\" cellpadding=\"0\" cellspacing=\"0\" width=\"100%\" class=\"mcnDividerBlock\" style=\"min-width: 100%; table-layout: fixed !important;\" /tr>\n                                <tr>\n                                    <td class=\"mcnTextContent\" valign=\"top\" style=\"padding: 0 9px; word-break: break-word; color: #000000; font-family: Helvetica; font-size: 16px; line-height: 150%;\" width=\"564\">\n                                        <h1 style=\"font-size: 24px; font-weight: bold; line-height: 150%;\"><strong>從管人到「管 AI」：AI 代理人時代，你的管理工具還有效嗎？<\/strong><\/h1>\n                                        <p style=\"margin: 10px 0; line-height: 150%;\">當企業開始以 AI 代理人執行談判、財務分析與客戶服務，管理者面對的核心問題已不再是「如何激勵員工」，而是「如何治理一套看不懂決策邏輯的自動化系統」。當企業導入 AI 代理人後，傳統的人力代理成本確實會下降，但隨之而來的「演算法代理成本」，包括指令誤解、錯誤指標最佳化與決策黑箱，正形成一套全新的治理挑戰。對於正在規模化導入 AI 工具的企業主管而言，這不只是技術選型的問題，而是整個管理框架需要重寫的警訊。<\/p>\n                                    <\/td>\n                                <\/tr>\n                            <\/tbody>\n                        <\/table>\n                    <\/td>\n                <\/tr>\n            <\/tbody>\n        <\/table>\n        <table border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-collapse: separate !important; border-radius: 15px; background-color: #f17205; width: 120px; margin-left: 9px;\">\n            <tbody>\n                <tr>\n                    <td align=\"center\" valign=\"middle\" style=\"font-family: Arial; font-size: 16px; padding: 0;\">\n                        <a class=\"mcnButton\" title=\"閱讀更多\" href=\"https://read.edm.aif.tw/c/eJw8z81uhCAUBeCngZ3mckEYFyyaqq8xQbj-JIIGsbZv30wy7fZ8Z3FOsDQ5KSQnK4xpm8cDWuSLVRCEAem10lpJMcmxNUYS-XFqGhEefLUIqKFBBQhCYi3qkaHBvh0GgOazE1r3vWFomAIKsXbrVJebb3Yp5TiZ_GA4MBwozPQ2hsOy31XZq41cqNKequWKLlVuplTOV18OV4nPc7-yJya7vopu3RjqVxoprFdksqPDHZSfhb7Lm7yLh1vnxGT3t5pHq9AAtKbl2Xr_IxAVUzAfObrkZsrHNW6rr_c88_J_9pnoPjcqhfLJvyz-BgAA___4JmBx\" target=\"_blank\" style=\"font-weight: normal; text-decoration: none; color: #FFFFFF; display: block; padding: 12px 20px; width: 100%; box-sizing: border-box;\">閱讀更多<\/a>\n                    <\/td>\n                <\/tr>\n px 4px; border-radius:4px; margin-right:5px;\">人才培育<\/span>\n<span style=\"border:1px solid #E6E6E6; color:#535252; background-color:#E6E6E6; padding:2px 4px; border-radius:4px; margin-right:5px;\">指引<\/span>\n<\/td><\/tr>\n                                <tr>\n                                    <td class=\"mcnTextContent\" valign=\"top\" style=\"padding: 0 9px; word-break: break-word; color: #000000; font-family: Helvetica; font-size: 16px; line-height: 150%;\" width=\"564\">\n                                        <h1 style=\"font-size: 24px; font-weight: bold; line-height: 150%;\"><strong>匯聚十年 AI 培育量能，AIF 攜手數發部共建產業人才生態系<\/strong><\/h1>\n                                        <p style=\"margin: 10px 0; line-height: 150%;\">數位發展部數位產業署19日召開記者會發布「AI 產業人才認定指引 3.0」，新增「AI 治理素養」與「AI 協作與開發」兩項能力，並攜手人工智慧科技基金會（AIF）、 Hahow、台灣人工智慧學校等生態圈夥伴，將指引從企業與求職者、培訓與認證機構參考的共通基準，進一步落實到產業工作場景。<\/p>\n                                    <\/td>\n                                <\/tr>\n                            <\/tbody>\n                        <\/table>\n                    <\/td>\n                <\/tr>\n            <\/tbody>\n        <\/table>\n        <table border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-collapse: separate !important; border-radius: 15px; background-color: #f17205; width: 120px; margin-left: 9px;\">\n            <tbody>\n                <tr>\n                    <td align=\"center\" valign=\"middle\" style=\"font-family: Arial; font-size: 16px; padding: 0;\">\n                        <a class=\"mcnButton\" title=\"閱讀更多\" href=\"https://read.edm.aif.tw/c/eJw80MGq4yAYBeCn0V2C_lpNFi6GSQLzFMXqn1RQK2qmt29_KfTe7fngwDne4G4FFxQN13q-TBObgd4NR6lvQrFZKa3txLkTave7kKg4Bz7RYICBYheQDBgXMPLxRkDDOm8bY5e_C1dqXTUBTSRDn0Yb9rE_aTT33ksj4g-BjcCG_sCPEdhsGP5lf7ZeX0O3EXMf3CMV7JjdazjO4DGGjG2oGNE2fHeI7ezp2h5ndUjEsg7JhkhAvdOEPpyJiAWLLVivHb_6h5xNxYYjE7H8LKHJSNCMzXqm1Tj34gCSSHaUmmy2B9Zy3mJw46MetP8ecM34bBF7x9rofwPfAQAA__-BQ2hZ\" target=\"_blank\" style=\"font-weight: normal; text-deco 36359;\" href=\"https://hudsoninstitute.cmail19.com/t/i-l-zkydddy-idhlhlcju-y/\"><img style=\"border: 0;display: block;height: auto;width: 100%;max-width: 900px;\" alt=\"\" width=\"560\" src=\"https://i2.cmail19.com/ei/i/2E/59A/4A3/001542/csfinal/GettyImages-2248456927-7836d778484ab2ab.jpeg\"><\/a>\n        <\/div>\n      <\/div>\n        \n          <\/div>\n        <!--[if mso]><\/td><\/tr><\/table><![endif]-->\n        <\/div>\n      <\/div>\n  \n      <div style=\"mso-line-height-rule: exactly;line-height: 10px;font-size: 10px;\">&nbsp;<\/div>\n  \n      <div style=\"background-color: #ffffff;\">\n        <div class=\"layout one-col stack\" style=\"Margin: 0 auto;max-width: 600px;min-width: 320px; width: 320px;width: calc(28000% - 167400px);overflow-wrap: break-word;word-wrap: break-word;word-break: break-word;\">\n          <div class=\"layout__inner\" style=\"border-collapse: collapse;display: table;width: 100%;\">\n          <!--[if mso]><table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\"><tr class=\"layout-full-width\" style=\"background-color: #ffffff;\"><td class=\"layout__edges\">&nbsp;<\/td><td style=\"width: 600px\" class=\"w560\"><![endif]-->\n            <div class=\"column\" style=\"text-align: left;color: #000;font-size: 14px;line-height: 21px;font-family: Georgia,serif;\">\n            \n              <div style=\"Margin-left: 20px;Margin-right: 20px;\">\n      <div style=\"mso-line-height-rule: exactly;mso-text-raise: 11px;vertical-align: middle;\">\n        <p class=\"size-22\" style=\"Margin-top: 0;Margin-bottom: 20px;font-size: 18px;line-height: 26px;\" lang=\"x-size-22\"><a class=\"no-underline\" style=\"text-decoration: none;transition: opacity 0.1s ease-in;color: #036359;\" href=\"https://hudsoninstitute.cmail19.com/t/i-l-zkydddy-idhlhlcju-j/\"><span style=\"text-decoration: inherit;color: #000000;\">Georgia at a Geopolitical Crossroads: Iranian Influence and Strategic Competition<\/span><\/a><\/p>\n      <\/div>\n    <\/div>\n            \n              <div style=\"Margin-left: 20px;Margin-right: 20px;\">\n      <div style=\"mso-line-height-rule: exactly;mso-text-raise: 11px;vertical-align: middle;\">\n        <p class=\"size-15\" style=\"Margin-top: 0;Margin-bottom: 0;font-size: 15px;line-height: 23px;\" lang=\"x-size-15\">Georgia was once one of the United States&#8217; most dependable strategic partners in the Black Sea region. Today, however, its government, led by the Georgian Dream party, has grown more authoritarian while aligning more closely with US adversaries, particularly the Islamic Republic of Iran. On Thursday,&#8239;<a style=\"text-decoration: underline;transition: opacity 0.1s ease-in;color: #036359;\" href=\"https://hudsoninstitute.cmail19.com/t/i-l-zkydddy-idhlhlcju-t/\"><strong>Matt Boyse<\/strong><\/a>, <a style=\"text-decoration: underline;transition: opacity 0.1s ease-in;color: #036359;\" href=\"https://hudsoninstitute.cmail19.com/t/i-l-zkydddy-idhlhlcju-i/\"><strong>Luke Coffey<\/strong><\/a>,&#8239;<span \nstyle=\"text-decoration: inherit;color: #036359;\"><strong>Giorgi Kandelaki<\/strong><\/span>,&#8239;<span style=\"text-decoration: inherit;color: #036359;\"><strong>Ian McGinnity<\/strong><\/span>, and Representative&#8239;<strong><span style=\"text-decoration: inherit;color: #036359;\">Joe Wilson<\/span>&#8239;<\/strong>(R-SC) examined&#8239;<a style=\"text-decoration: underline;transition: opacity 0.1s ease-in;color: #036359;\" href=\"https://hudsoninstitute.cmail19.com/t/i-l-zkydddy-idhlhlcju-d/\">Tehran&#8217;s expanding influence in Georgia<\/a>. Hudson President and CEO&#8239;<a style=\"text-decoration: underline;transition: opacity 0.1s ease-in;color: #036359;\" href=\"https://hudsoninstitute.cmail19.com/t/i-l-zkydddy-idhlhlcju-h/\"><strong>John P. Walters<\/strong><\/a><strong>&#8239;<\/strong>delivered introductory remarks.<\/p><p class=\"size-15\" \nstyle=\"Margin-top: 20px;Margin-bottom: 0;font-size: 15px;line-height: 23px;\" lang=\"x-size-15\"><a style=\"text-decoration: underline;transition: opacity 0.1s ease-in;color: #036359;\" href=\"https://hudsoninstitute.cmail19.com/t/i-l-zkydddy-idhlhlcju-k/\">Watch the event, listen to the podcast, or read the transcript here.<\/a>&nbsp;<\/p>\n      <\/div>\n    <\/div>\n            \n            <\/div>\n          <!--[if mso]><\/td><td class=\"layout__edges\">&nbsp;<\/td><\/tr><\/table><![endif]-->\n          <\/div>\n        <\/div>\n      <\/div>\n  \n      <div style=\"mso-line-height-rule: exactly;line-height: 18px;font-size: 18px;\">&nbsp;<\/div>\n  \n      <div class=\"layout one-col fixed-width stack\" style=\"Margin: 0 auto;max-width: 600px;min-width: 320px; width: 320px;width: calc(28000% - 167400px);overflow-wrap: break-word;word-wrap: break-word;word-break: break-word;\">\n        <div class=\"layout__inner\" style=\"border-collapse: collapse;display: table;width: 100%;background-color: #dfe5e9;\">\n        <!--[if mso]><table align=\"center\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\"><tr class=\"layout-fixed-width\" style=\"background-color: #dfe5e9;\"><td style=\"width: 600px\" class=\"w560\"><![endif]-->\n          <div class=\"column\" style=\"text-align: left;color: #000;font-size: 14px;line-height: 21px;font-family: Georgia,serif;\">\n        \n            <div style=\"Margin-left: 20px;Margin-right: 20px;\">\n      <div style=\"mso-line-height-rule: exactly;line-height: 15px;font-size: 1px;\">&nbsp;<\/div>\n    <\/div>\n        \n            <div style=\"Margin-left: 20px;Margin-right: 20px;\">\n      <div style=\"mso-line-height-rule: exactly;mso-text-raise: 11px;vertical-align: middle;\">\n        <p class=\"size-22\" style=\"Margin-top: 0;Margin-bottom: 20px;font-family: Georgia,serif;font-size: 18px;line-height: 26px;text-align: center;\" lang=\"x-size-22\"><span class=\"font-georgia\" style=\"text-decoration: inherit;\"><span style=\"text-decoration: inherit;color: #000000;\">Key Insights<\/span><\/span><\/p>\n      <\/div>\n    <\/div>\n        \n            <div style=\"Margin-left: 20px;Margin-right: 20px;\">\n      <div style=\"mso-line-height-rule: exactly;mso-text-raise: 11px;vertical-align: middle;\">\n        <p class=\"size-18\" style=\"Margin-top: 0;Margin-bottom: 20px;font-family: Georgia,serif;font-size: 17px;line-height: 26px;\" lang=\"x-size-18\"><span class=\"font-georgia\" style=\"text-decoration: inherit;\"><strong>1. Evidence shows that the Georgian Dream&#8211;led government increasingly supports Iran.<\/strong><\/span><\/p>\n      <\/div>\n    <\/div>\n        \n            <div style=\"Margin-left: 20px;Margin-right: 20px;\">\n      <div style=\"mso-line-height-rule: exactly;mso-text-raise: 11px;vertical-align: middle;\">\n        <p class=\"size-15\" style=\"Margin-top: 0;Margin-bottom: 0;font-size: 15px;line-height: 23px;\" lang=\"x-size-15\">&#8220;We should look honestly at Georgian Dream as it supports the terrorist regime of Tehran. In February 2026, the Georgian Dream [deputy] foreign minister attended an Iranian embassy event celebrating the anniversary of the 1979 Iranian Revolution.&#8239;.&#8239;.&#8239;. Additionally, Tbilisi&#8217;s TV Tower was illuminated in Iranian flag colors.&#8239;.&#8239;.&#8239;. A Georgian Dream government representative grotesquely and revealingly signed a condolence book at the Iranian embassy, mourning the dictator Khamenei .&#8239;.&#8239;. in the very year that dictator Khamenei had killed 50,000 Iranian citizens.&#8239;.&#8239;.&#8239;. Georgian Dream has helped Iran in the current war by allowing strategic Russian airlifters to transit its airspace on route to Iran, \ncarrying supplies to help the Iranian regime.&#8221;<\/p><p class=\"size-15\" style=\"Margin-top: 20px;Margin-bottom: 20px;font-size: 15px;line-height: 23px;\" lang=\"x-size-15\">&#8212; Representative Joe Wilson (R-SC)<\/p>\n      <\/div>\n    <\/div>\n        \n            <div style=\"Margin-left: 20px;Margin-right: 20px;\">\n      <div style=\"mso-line-height-rule: exactly;line-height: 1px;font-size: 1px;\">&nbsp;<\/div>\n    <\/div>\n        \n          <\/div>\n        <!--[if mso]><\/td><\/tr><\/table><![endif]-->\n        <\/div>\n      <\/div>\n  \n      <div class=\"layout one-col fixed-width stack\" style=\"Margin: 0 auto;max-width: 600px;min-width: 320px; width: 320px;width: calc(28000% - 167400px);overflow-wrap: break-word;word-wrap: break-word;word-break: break-word;\">\n        <div class=\"layout__inner\" style=\"border-collapse: collapse;display: table;width: 100%;background-color: #dfe5e9;\">\n        <!--[if mso]><table align=\"center\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\"><tr class=\"layout-fixed-width\" style=\"background-color: #dfe5e9;\"><td style=\"width: 600px\" class=\"w560\"><![endif]-->\n          <div class=\"column\" style=\"text-align: left;color: #000;font-size: 14px;line-height: 21px;font-family: Georgia,serif;\">\n        \n            <div style=\"Margin-left: 20px;Margin-right: 20px;\">\n      <div style=\"mso-line-height-rule: exactly;mso-text-raise: 11px;vertical-align: middle;\">\n        <p class=\"size-18\" style=\"Margin-top: 0;Margin-bottom: 20px;font-family: Georgia,serif;font-size: 17px;line-height: 26px;\" lang=\"x-size-18\"><span class=\"font-georgia\" style=\"text-decoration: inherit;\"><strong>2. While many people understand that Georgia has moved toward Russia, Tbilisi&#8217;s support for Iran is less well-known.&nbsp;<\/strong><\/span><\/p>\n      <\/div>\n    <\/div>\n        \n            <div style=\"Margin-left: 20px;Margin-right: 20px;\">\n      <div style=\"mso-line-height-rule: exactly;mso-text-raise: 11px;vertical-align: middle;\">\n        <p class=\"size-15\" style=\"Margin-top: 0;Margin-bottom: 0;font-size: 15px;line-height: 23px;\" lang=\"x-size-15\">&#8220;Many people have thought that Georgia&#8217;s slide away from the West, and the United States in particular, is just about Russia. And the message of this report&#8212;one of the messages that I and Luke hoped to put forth&#8212;is that that is not the case. This trajectory away from the civilized world has this Iranian dimension.&#8239;.&#8239;.&#8239;. For the last few years, the Islamic Republic of Iran has been able to find a comfortable environment in which it successfully built formidable influence infrastructure, which consists of whole ecosystem of organizations that, in this city or in other Western capitals, are regarded as [Islamic Revolutionary Guard Corps] fronts that the IRGC uses for recruitment of individuals in various countries and then \nsubsequently for operations, against the United States in particular.&#8221;<\/p><p class=\"size-15\" style=\"Margin-top: 20px;Margin-bottom: 20px;font-size: 15px;line-height: 23px;\" lang=\"x-size-15\">&#8212; Giorgi Kandelaki<\/p>\n      <\/div>\n    <\/div>\n        \n            <div style=\"Margin-left: 20px;Margin-right: 20px;\">\n      <div style=\"mso-line-height-rule: exactly;mso-text-raise: 11px;vertical-align: middle;\">\n        <p class=\"size-18\" style=\"Margin-top: 0;Margin-bottom: 20px;font-family: Georgia,serif;font-size: 17px;line-height: 26px;\" lang=\"x-size-18\"><span class=\"font-georgia\" style=\"text-decoration: inherit;\"><strong>3. Georgian Dream needs to crack down on the Iranian threat.<\/strong><\/span><\/p>\n      <\/div>\n    <\/div>\n        \n            <div style=\"Margin-left: 20px;Margin-right: 20px;\">\n      <div style=\"mso-line-height-rule: exactly;mso-text-raise: 11px;vertical-align: middle;\">\n        <p class=\"size-15\" style=\"Margin-top: 0;Margin-bottom: 0;font-size: 15px;line-height: 23px;\" lang=\"x-size-15\">&#8220;So, what can the Georgian Dream do? What should the United States expect this government to do? Firstly, [Tbilisi] needs to show that it wants to be America&#8217;s partner. I think the ball is very much in the Georgian Dream&#8217;s court right now. They have this idea that they are the populists, the MAGA of Georgia, and nothing could be further from the truth.&#8239;.&#8239;.&#8239;. So, the first thing they need to do is demonstrate .&#8239;.&#8239;. that they&#8217;re serious about cracking down on this Iranian threat. You don&#8217;t have to go to the Iranian embassy to sign a condolence book, okay?&#8239;.&#8239;.&#8239;. But then I think we need to have a more visible crackdown on some of these networks that exist that are outlined in the report that Giorgi \njust mentioned .&#8239;.&#8239;. because this is not in America&#8217;s interest, and it&#8217;s not in Georgia&#8217;s interest as well.&#8221;<\/p><p class=\"size-15\" style=\"Margin-top: 20px;Margin-bottom: 0;font-size: 15px;line-height: 23px;\" lang=\"x-size-15\">&#8212; Luke Coffey&nbsp;&nbsp;<\/p><p class=\"size-15\" style=\"Margin-top: 20px;Margin-bottom: 20px;font-size: 15px;line-height: 23px;\" lang=\"x-size-15\"><a style=\"text-decoration: underline;transition: opacity 0.1s ease-in;color: #036359;\" href=\"https://hudsoninstitute.cmail19.com/t/i-l-zkydddy-idhlhlcju-u/\">Watch the event, listen to the podcast, or read the transcript here.<\/a>&nbsp;<\/p>\n      <\/div>\n    <\/div>\n        \n            <div style=\"Margin-left: 20px;Margin-right: 20px;\">\n      <div style=\"mso-line-height-rule: exactly;line-height: 1px;font-size: 1px;\">&nbsp;<\/div>\n    <\/div>\n        \n          <\/div>\n        <!--[if mso]><\/td><\/tr><\/table><![endif]-->\n        <\/div>\n      <\/div>\n  \n      <div class=\"layout one-col fixed-width stack\" style=\"Margin: 0 auto;max-width: 600px;min-width: 320px; width: 320px;width: calc(28000% - 167400px);overflow-wrap: break-word;word-wrap: break-word;word-break: break-word;\">\n        <div class=\"layout__inner\" style=\"border-collapse: collapse;display: table;width: 100%;background-color: #dfe5e9;\">\n        <!--[if mso]><table align=\"center\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\"><tr class=\"layout-fixed-width\" style=\"background-color: #dfe5   \n            <div style=\"Margin-left: 20px;Margin-right: 20px;\">\n      <div style=\"mso-line-height-rule: exactly;mso-text-raise: 11px;vertical-align: middle;\">\n        <p class=\"size-18\" style=\"Margin-top: 0;Margin-bottom: 20px;font-family: Georgia,serif;font-size: 17px;line-height: 26px;\" lang=\"x-size-18\"><span class=\"font-georgia\" style=\"text-decoration: inherit;\"><strong>1. Evidence shows that the Georgian Dream&#8211;led government increasingly supports Iran.<\/strong><\/span><\/p>\n      <\/div>\n    <\/div>\n        \n            <div style=\"Margin-left: 20px;Margin-right: 20px;\">\n      <div style=\"mso-line-height-rule: exactly;mso-text-raise: 11px;vertical-align: middle;\">\n        <p class=\"size-15\" style=\"Margin-top: 0;Margin-bottom: 0;font-size: 15px;line-height: 23px;\" lang=\"x-size-15\">&#8220;We should look honestly at Georgian Dream as it supports the terrorist regime of Tehran. In February 2026, the Georgian Dream [deputy] foreign minister attended an Iranian embassy event celebrating the anniversary of the 1979 Iranian Revolution.&#8239;.&#8239;.&#8239;. Additionally, Tbilisi&#8217;s TV Tower was illuminated in Iranian flag colors.&#8239;.&#8239;.&#8239;. A Georgian Dream government representative grotesquely and revealingly signed a condolence book at the Iranian embassy, mourning the dictator Khamenei .&#8239;.&#8239;. in the very year that dictator Khamenei had killed 50,000 Iranian citizens.&#8239;.&#8239;.&#8239;. Georgian Dream has helped Iran in the current war by allowing strategic Russian airlifters to transit its airspace on route to Iran, \ncarrying supplies to help the Iranian regime.&#8221;<\/p><p class=\"size-15\" style=\"Margin-top: 20px;Margin-bottom: 20px;font-size: 15px;line-height: 23px;\" lang=\"x-size-15\">&#8212; Representative Joe Wilson (R-SC)<\/p>\n      <\/div>\n    <\/div>\n        \n            <div style=\"Margin-left: 20px;Margin-right: 20px;\">\n      <div style=\"mso-line-height-rule: exactly;line-height: 1px;font-size: 1px;\">&nbsp;<\/div>\n    <\/div>\n        \n          <\/div>\n        <!--[if mso]><\/td><\/tr><\/table><![endif]-->\n        <\/div>\n      <\/div>\n  \n      <div class=\"layout one-col fixed-width stack\" style=\"Margin: 0 auto;max-width: 600px;min-width: 320px; width: 320px;width: calc(28000% - 167400px);overflow-wrap: break-word;word-wrap: break-word;word-break: break-word;\">\n        <div class=\"layout__inner\" style=\"border-collapse: collapse;display: table;width: 100%;background-color: #dfe5e9;\">\n        <!--[if mso]><table align=\"center\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\"><tr class=\"layout-fixed-width\" style=\"background-color: #dfe5e9;\"><td style=\"width: 600px\" class=\"w560\"><![endif]-->\n          <div class=\"column\" style=\"text-align: left;color: #000;font-size: 14px;line-height: 21px;font-family: Georgia,serif;\">\n        \n            <div style=\"Margin-left: 20px;Margin-right: 20px;\">\n      <div style=\"mso-line-height-rule: exactly;mso-text-raise: 11px;vertical-align: middle;\">\n        <p class=\"size-18\" style=\"Margin-top: 0;Margin-bottom: 20px;font-family: Georgia,serif;font-size: 17px;line-height: 26px;\" lang=\"x-size-18\"><span class=\"font-georgia\" style=\"text-decoration: inherit;\"><strong>2. Insulate the US homeland from PRC robotics.<\/strong><\/span><\/p>\n      <\/div>\n    <\/div>\n        \n            <div style=\"Margin-left: 20px;Margin-right: 20px;\">\n      <div style=\"mso-line-height-rule: exactly;mso-text-raise: 11px;vertical-align: middle;\">\n        <p class=\"size-15\" style=\"Margin-top: 0;Margin-bottom: 0;font-size: 15px;line-height: 23px;\" lang=\"x-size-15\">&#8220;Many people have thought that Georgia&#8217;s slide away from the West, and the United States in particular, is just about Russia. And the message of this report&#8212;one of the messages that I and Luke hoped to put forth&#8212;is that that is not the case. This trajectory away from the civilized world has this Iranian dimension.&#8239;.&#8239;.&#8239;. For the last few years, the Islamic Republic of Iran has been able to find a comfortable environment in which it successfully built formidable influence infrastructure, which consists of whole ecosystem of organizations that, in this city or in other Western capitals, are regarded as [Islamic Revolutionary Guard Corps] fronts that the IRGC uses for recruitment of individuals in various countries and then \nsubsequently for operations, against the United States in particular.&#8221;<\/p><p class=\"size-15\" style=\"Margin-top: 20px;Margin-bottom: 20px;font-size: 15px;line-height: 23px;\" lang=\"x-size-15\">&#8212; Giorgi Kandelaki<\/p>\n      <\/div>\n    <\/div>\n        \n            <div style=\"Margin-left: 20px;Margin-right: 20px;\">\n      <div style=\"mso-line-height-rule: exactly;line-height: 1px;font-size: 1px;\">&nbsp;<\/div>\n    <\/div>\n        \n          <\/div>\n        <!--[if mso]><\/td><\/tr><\/table><![endif]-->\n        <\/div>\n      <\/div>\n  \n      <div class=\"layout one-col fixed-width stack\" style=\"Margin: 0 auto;max-width: 600px;min-width: 320px; width: 320px;width: calc(28000% - 167400px);overflow-wrap: break-word;word-wrap: break-word;word-break: break-word;\">\n        <div class=\"layout__inner\" style=\"border-collapse: collapse;display: table;width: 100%;background-color: #dfe5e9;\">\n        <!--[if mso]><table align=\"center\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\"><tr class=\"layout-fixed-width\" style=\"background-color: #dfe5e9;\"><td style=\"width: 600px\" class=\"w560\"><![endif]-->\n          <div class=\"column\" style=\"text-align: left;color: #000;font-size: 14px;line-height: 21px;font-family: Georgia,serif;\">\n        \n            <div style=\"Margin-left: 20px;Margin-right: 20px;\">\n      <div style=\"mso-line-height-rule: exactly;mso-text-raise: 11px;vertical-align: middle;\">\n        <p class=\"size-18\" style=\"Margin-top: 0;Margin-bottom: 20px;font-family: Georgia,serif;font-size: 17px;line-height: 26px;\" lang=\"x-size-18\"><span class=\"font-georgia\" style=\"text-decoration: inherit;\"><strong>3. Deny PRC access to critical US technologies.<\/strong><\/span><\/p>\n      <\/div>\n    <\/div>\n        \n            <div style=\"Margin-left: 20px;Margin-right: 20px;\">\n      <div style=\"mso-line-height-rule: exactly;mso-text-raise: 11px;vertical-align: middle;\">\n        <p class=\"size-15\" style=\"Margin-top: 0;Margin-bottom: 0;font-size: 15px;line-height: 23px;\" lang=\"x-size-15\">&#8220;So what can the Georgian Dream do? What should the United States expect this government to do? Firstly, [Tbilisi] needs to show that it wants to be America&#8217;s partner. I think the ball is very much in the Georgian Dream&#8217;s court right now. They have this idea that they are the populists, the MAGA of Georgia, and nothing could be further from the truth.&#8239;.&#8239;.&#8239;. So the first thing they need to do is demonstrate .&#8239;.&#8239;. that they&#8217;re serious about cracking down on this Iranian threat. You don&#8217;t have to go to the Iranian embassy to sign a condolence book, okay?&#8239;.&#8239;.&#8239;. But then I think we need to have a more visible crackdown on some of these networks that exist that are outlined in the report that Giorgi \njust mentioned .&#8239;.&#8239;. because this is not in America&#8217;s interest, and it&#8217;s not in Georgia&#8217;s interest as well.&#8221;<\/p><p class=\"size-15\" style=\"Margin-top: 20px;Margin-bottom: 0;font-size: 15px;line-height: 23px;\" lang=\"x-size-15\">&#8212; Luke Coffey&nbsp;<\/p><p class=\"size-15\" style=\"Margin-top: 20px;Margin-bottom: 20px;font-size: 15px;line-height: 23px;\" lang=\"x-size-15\"><a style=\"text-decoration: underline;transition: opacity 0.1s ease-in;color: #036359;\" href=\"https://hudsoninstitute.cmail19.com/t/i-l-zkytykt-idhlhlcju-o/\">Watch the event, listen to the podcast, or read the t \" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\" style=\"mso-table-lspace:0;mso-table-rspace:0\"><tr><td class=\"pad\" style=\"padding-bottom:10px\" align=\"center\">\n<table border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\" width=\"100%\" style=\"mso-table-lspace:0;mso-table-rspace:0\"><tr><td class=\"divider_inner\" style=\"font-size:1px;line-height:1px;border-top:1px solid #000\"><span style=\"word-break: break-word;\">&#8202;<\/span><\/td><\/tr><\/table><\/td><\/tr><\/table><table class=\"text_block block-2\" width=\"100%\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\" style=\"mso-table-lspace:0;mso-table-rspace:0;word-break:break-word\"><tr><td \nclass=\"pad\"><div style=\"font-family:Arial,sans-serif\"><div class style=\"font-family:seasonSans,Arial,sans-serif;font-size:12px;mso-line-height-alt:19.200000000000003px;color:#000;line-height:1.6\"><p style=\"margin:0;mso-line-height-alt:38.400000000000006px\"><span style=\"word-break: break-word; font-size: 24px;\"><strong>About Sebastian and Rebecca<\/strong><\/span><\/p><\/div><\/div><\/td><\/tr><\/table><\/td><\/tr><\/table><\/td><\/tr><\/tbody><\/table><\/td><\/tr><\/tbody><\/table><table class=\"row row-8\" \nalign=\"center\" width=\"100%\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\" style=\"mso-table-lspace:0;mso-table-rspace:0\"><tbody><tr><td><table class=\"row-content stack\" align=\"center\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\" style=\"mso-table-lspace:0;mso-table-rspace:0;color:#000;width:600px;margin:0 auto\" width=\"600\"><tbody><tr class=\"reverse\"><td class=\"column column-1 first\" width=\"100%\" \nstyle=\"mso-table-lspace:0;mso-table-rspace:0;font-weight:400;text-align:left;vertical-align:top\"><table width=\"100%\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\" style=\"mso-table-lspace:0;mso-table-rspace:0\"><tr><td class=\"col-pad\" style=\"padding-bottom:10px;padding-top:10px\"><table class=\"text_block block-1\" width=\"100%\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\" style=\"mso-table-lspace:0;mso-table-rspace:0;word-break:break-word\"><tr><td class=\"pad\" \nstyle=\"padding-bottom:10px\"><div style=\"font-family:Georgia,'Times New Roman',serif\"><div class style=\"font-family:Georgia,Times,'Times New Roman',serif;font-size:12px;mso-line-height-alt:19.200000000000003px;color:#000;line-height:1.6\"><p style=\"margin:0;font-size:16px;mso-line-height-alt:25.6px\">\n<span style=\"word-break: break-word; font-size: 16px;\"><strong>Sebastian Mallaby<\/strong> is the Paul A. Volcker senior fellow for international economics at CFR. A two-time Pulitzer Prize finalist, he is the author of six books, including <em>More Money Than God: Hedge Funds and the Making of a New Elite<\/em> and <em>The Power Law: Venture Capital and the Making of the New Future<\/em>, which have become investment classics. His latest book is <em>The Infinity Machine: Demis Hassabis, DeepMind, and the Quest for Superintelligence<\/em>; the <em>Financial Times<\/em> wrote that “Mallaby has done full justice to his kaleidoscopically interesting subject.” An experienced journalist and public speaker, Mallaby’s interests cover a wide variety of domestic and international issues, including the technology sector, central banks, financial markets, the implications of the rise of newly emerging powers, and the intersection of economics and international relations.&nbsp;\n<br><\/span><\/p><p style=\"margin:0;font-size:16px;mso-line-height-alt:19.200000000000003px\">&nbsp;<\/p><p style=\"margin:0;font-size:16px;mso-line-height-alt:25.6px\">\n<span style=\"word-break: break-word; font-size: 16px;\"><strong>Rebecca Patterson<\/strong> is a senior fellow at CFR. A globally recognized investor and macroeconomic researcher with more than twenty-five years of experience across the United States, Asia, and Europe, Patterson studies how politics and policy intersect with economic trends to drive financial markets. Through the Washington Speakers Bureau, she is also a frequently requested speaker on macroeconomic and financial market topics, where she provides actionable insights to a wide array of companies and industry organizations. Patterson is an independent director at Vanguard, a global asset manager overseeing more than $10 trillion in assets. Previously, she was the chief investment strategist for Bridgewater Associates, the world’s largest hedge fund. Patterson’s transition to finance came after several years working as a journalist, covering financial markets, policy, and politics in the United States and Europe.<\/span>\n<\/p><\/div><\/div><\/td><\/tr><\/table><table class=\"image_block block-2\" width=\"100%\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\" style=\"mso-table-lspace:0;mso-table-rspace:0\"><tr><td class=\"pad\" style=\"width:100%;padding-top:10px;padding-bottom:10px\" align=\"center\"><div class=\"fullWidth\" style=\"max-width:540px\"><a href=\"https://link.cfr.org/click/45844614.15608/aHR0cHM6Ly93d3cuY2ZyLm9yZy9wb2RjYXN0cy9zcGlsbG92ZXI_dXRtX3NvdXJjZT1hbm5vdW5jZW1lbnQtMjAyNjA1dGhlc3BpbGxvdmVyJnV0bV9tZWRpdW09ZW1haWw/6a118d63392ed0fb3505cc48Db0c9384c\" target=\"_blank\"><img \nsrc=\"https://media.sailthru.com/fss/fl8yet/25d68732-feee-4607-9ee0-cca32f16697c/202605-promo-spillover-maxresdefault.jpg\" style=\"display:block;height:auto;border:0;width:100%\" width=\"540\" alt=\"Presenting: The Spillover\" title=\"Presenting: The Spillover\" height=\"auto\"><\/a><\/div><\/td><\/tr><\/table><table class=\"button_block block-3\" width=\"100%\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\" style=\"mso-table-lspace:0;mso-table-rspace:0\"><tr><td class=\"pad\" \nstyle=\"padding-top:10px;padding-bottom:10px\" align=\"center\"><a href=\"https://link.cfr.org/click/45844614.15608/aHR0cHM6Ly93d3cuY2ZyLm9yZy9wb2RjYXN0cy9zcGlsbG92ZXI_dXRtX3NvdX 0%;margin:0;margin-bottom:0;padding:0;text-align:left;word-wrap:normal\"><a href=\"https://pewresearch.us1.list-manage.com/track/click?u=434f5d1199912232d416897e4&id=70c0d3be92&e=939588bbb8\" style=\"Margin:0;color:#2a2a2a;font-family:franklin-gothic-urw,Arial;font-size:24px;font-weight:600;line-height:1.3;margin:0;padding:0;text-align:left;text-decoration:none\" target=\"_blank\">Have Americans’ wages kept up with inflation? That depends<\/a><\/h1><table role=\"presentation\" style=\"border-collapse:collapse;border-spacing:0;padding:0;text-align:left;width:100%\"><tbody><tr style=\"padding:0;text-align:left\"><td height=\"15px\" style=\"Margin:0;color:#2a2a2a;font-family:Arial;font-size:15px;font-weight:400;hyphens:none!important;line-height:15px;margin:0;mso-line-height-rule:exactly;padding:0;text-align:left\">&#xA0;<\/td><\/tr><\/tbody><\/table><p class=\"bd\" style=\"Margin:0;Margin-bottom:20px;color:#2a2a2a;font-family:Arial;font-size:18px;font-weight:400;line-height:1.5;margin:0;margin-bottom:0!important;padding:0;padding-bottom:0!important;text-align:left\">A majority of Americans see inflation as a very big problem for the country today. How well U.S. wages have kept pace with rising prices depends on which measure you use: <a href=\"https://pewresearch.us1.list-manage.com/track/click?u=434f5d1199912232d416897e4&id=b52e31fef0&e=939588bbb8\" style=\"Margin:0;color:#346EAD;font-family:Arial;font-weight:400;line-height:1.3;margin:0;padding:0;text-align:left;text-decoration:underline\" target=\"_blank\">Based on four different gauges of inflation<\/a>, the buying power of the median wage has grown anywhere from 11% to 22% since the turn of the century.\n\n<ul>\n\t<li style=\"margin-bottom: 14px;\"><strong>Also read:<\/strong> <a href=\"https://pewresearch.us1.list-manage.com/track/click?u=434f5d1199912232d416897e4&id=e6ed1c871f&e=939588bbb8\" style=\"Margin:0;color:#346EAD;font-family:Arial;font-weight:400;line-height:1.3;margin:0;padding:0;text-align:left;text- const EMBED = true;
let state = { q: "", topic: null, source: null, sort: "new" };

const $ = (s) => document.querySelector(s);
const feed = $("#feed");

// 建立側邊篩選
function buildFilters() {
  const topics = {}, sources = {};
  DATA.forEach(e => {
    topics[e.topic] = (topics[e.topic]||0)+1;
    sources[e.source] = (sources[e.source]||0)+1;
  });
  renderFilterGroup("#topicFilters", topics, "topic");
  renderFilterGroup("#sourceFilters", sources, "source");
}
function renderFilterGroup(sel, counts, key) {
  const box = $(sel);
  const all = document.createElement("button");
  all.className = "filter active"; all.dataset.key = key; all.dataset.val = "";
  all.innerHTML = `<span>全部</span><span class="n">${Object.values(counts).reduce((a,b)=>a+b,0)}</span>`;
  box.appendChild(all);
  Object.entries(counts).sort((a,b)=>b[1]-a[1]).forEach(([name, n]) => {
    const b = document.createElement("button");
    b.className = "filter"; b.dataset.key = key; b.dataset.val = name;
    b.innerHTML = `<span>${escapeHtml(name)}</span><span class="n">${n}</span>`;
    box.appendChild(b);
  });
  box.addEventListener("click", (ev) => {
    const btn = ev.target.closest(".filter"); if (!btn) return;
    state[key] = btn.dataset.val || null;
    box.querySelectorAll(".filter").forEach(x => x.classList.remove("active"));
    btn.classList.add("active");
    render();
  });
}

function escapeHtml(s) {
  return (s||"").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
}

function filtered() {
  let out = DATA.filter(e => {
    if (state.topic && e.topic !== state.topic) return false;
    if (state.source && e.source !== state.source) return false;
    if (state.q) {
      const hay = (e.subject + " " + e.source + " " + e.from_email + " " + e.excerpt).toLowerCase();
      if (!hay.includes(state.q.toLowerCase())) return false;
    }
    return true;
  });
  const s = state.sort;
  out.sort((a,b) => {
    if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
    if (s === "new") return b.date_sort - a.date_sort;
    if (s === "old") return a.date_sort - b.date_sort;
    if (s === "az")  return a.subject.localeCompare(b.subject, "zh-Hant");
    return 0;
  });
  return out;
}

function render() {
  const items = filtered();
  feed.innerHTML = "";
  if (!items.length) {
    feed.innerHTML = `<div class="empty">沒有符合條件的卷宗。<br>試著放寬搜尋或切換篩選。</div>`;
    return;
  }
  items.forEach((e, i) => {
    const art = document.createElement("article");
    art.className = "entry";
    art.style.animationDelay = Math.min(i * 0.04, 0.4) + "s";
    art.innerHTML = `
      <div class="topline">
        <span class="tag">${escapeHtml(e.topic)}</span>
        ${e.pinned ? '<span class="pin">★ 置頂</span>' : ''}
      </div>
      <h2>${escapeHtml(e.subject)}</h2>
      <div class="meta">
        <span class="src">${escapeHtml(e.source)}</span>
        <span class="dot"></span><span>${escapeHtml(e.date_label)}</span>
        <span class="dot"></span><span>約 ${e.minutes} 分鐘</span>
        ${e.has_body ? '' : '<span class="dot"></span><span class="nobody">僅存目</span>'}
      </div>
      <p class="excerpt">${escapeHtml(e.excerpt || "（此封信件沒有可預覽的內文）")}</p>
      ${e.has_body ? '<span class="more">閱讀全文</span>' : ''}`;
    art.addEventListener("click", () => openReader(e));
    feed.appendChild(art);
  });
}

// 閱讀面板
const readerBg = $("#readerBg"), reader = $("#reader");
function openReader(e) {
  $("#rTag").textContent = e.topic;
  $("#rTitle").textContent = e.subject;
  $("#rMeta").innerHTML =
    `<span>${escapeHtml(e.source)}</span>` +
    (e.from_email ? `<span>${escapeHtml(e.from_email)}</span>` : "") +
    `<span>${escapeHtml(e.date_label)}</span>`;
  const body = $("#rBody");
  if (!e.has_body) {
    body.innerHTML = `<div class="fallback">這封信件目前只有索引資料，沒有保存完整內文。</div>`;
  } else if (EMBED) {
    const f = document.createElement("iframe");
    f.setAttribute("sandbox", "allow-popups allow-popups-to-escape-sandbox");
    f.srcdoc = e.html;
    body.innerHTML = ""; body.appendChild(f);
  } else {
    const f = document.createElement("iframe");
    f.setAttribute("sandbox", "allow-popups allow-popups-to-escape-sandbox");
    f.src = e.rel_path;
    body.innerHTML = ""; body.appendChild(f);
  }
  readerBg.classList.add("open");
  reader.classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeReader() {
  readerBg.classList.remove("open");
  reader.classList.remove("open");
  document.body.style.overflow = "";
  setTimeout(() => { $("#rBody").innerHTML = ""; }, 420);
}
readerBg.addEventListener("click", closeReader);
$("#closeReader").addEventListener("click", closeReader);
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeReader(); });

$("#q").addEventListener("input", (e) => { state.q = e.target.value; render(); });
$("#sort").addEventListener("change", (e) => { state.sort = e.target.value; render(); });

buildFilters();
render();
</script>
