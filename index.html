sition: opacity 0.1s ease-in;color: #036359;\" href=\"https://hudsoninstitute.cmail19.com/t/i-l-zkytykt-idhlhlcju-d/\">Tehran&#8217;s expanding influence in Georgia<\/a>. Hudson President and CEO&#8239;<a style=\"text-decoration: underline;transition: opacity 0.1s ease-in;color: #036359;\" href=\"https://hudsoninstitute.cmail19.com/t/i-l-zkytykt-idhlhlcju-h/\"><strong>John P. Walters<\/strong><\/a><strong>&#8239;<\/strong>delivered introductory remarks.<\/p><p class=\"size-15\" \nstyle=\"Margin-top: 20px;Margin-bottom: 0;font-size: 15px;line-height: 23px;\" lang=\"x-size-15\"><a style=\"text-decoration: underline;transition: opacity 0.1s ease-in;color: #036359;\" href=\"https://hudsoninstitute.cmail19.com/t/i-l-zkytykt-idhlhlcju-k/\">Watch the event, listen to the podcast, or read the transcript here.<\/a><\/p><p class=\"size-15\" style=\"Margin-top: 20px;Margin-bottom: 0;font-size: 15px;line-height: 23px;\" lang=\"x-size-15\"><a style=\"text-decoration: underline;transition: opacity 0.1s ease-in;color: #036359;\" href=\"https://hudsoninstitute.cmail19.com/t/i-l-zkytykt-idhlhlcju-u/\">Read Kandelaki and Coffey&#8217;s Hudson report on the topic here.<\/a><\/p>\n      <\/div>\n    <\/div>\n            \n            <\/div>\n          <!--[if mso]><\/td><td class=\"layout__edges\">&nbsp;<\/td><\/tr><\/table><![endif]-->\n          <\/div>\n        <\/div>\n      <\/div>\n  \n      <div style=\"mso-line-height-rule: exactly;line-height: 18px;font-size: 18px;\">&nbsp;<\/div>\n  \n      <div class=\"layout one-col fixed-width stack\" style=\"Margin: 0 auto;max-width: 600px;min-width: 320px; width: 320px;width: calc(28000% - 167400px);overflow-wrap: break-word;word-wrap: break-word;word-break: break-word;\">\n        <div class=\"layout__inner\" style=\"border-collapse: collapse;display: table;width: 100%;background-color: #dfe5e9;\">\n        <!--[if mso]><table align=\"center\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\"><tr class=\"layout-fixed-width\" style=\"background-color: #dfe5e9;\"><td style=\"width: 600px\" class=\"w560\"><![endif]-->\n          <div class=\"column\" style=\"text-align: left;color: #000;font-size: 14px;line-height: 21px;font-family: Georgia,serif;\">\n        \n            <div style=\"Margin-left: 20px;Margin-right: 20px;\">\n      <div style=\"mso-line-height-rule: exactly;line-height: 15px;font-size: 1px;\">&nbsp;<\/div>\n    <\/div>\n        \n            <div style=\"Margin-left: 20px;Margin-right: 20px;\">\n      <div style=\"mso-line-height-rule: exactly;mso-text-raise: 11px;vertical-align: middle;\">\n        <p class=\"size-22\" style=\"Margin-top: 0;Margin-bottom: 20px;font-family: Georgia,serif;font-size: 18px;line-height: 26px;text-align: center;\" lang=\"x-size-22\"><span class=\"font-georgia\" style=\"text-decoration: inherit;\"><span style=\"text-decoration: inherit;color: #000000;\">Key Insights<\/span><\/span><\/p>\n      <\/div>\n    <\/div>\n        \n            <div style=\"Margin-left: 20px;Margin-right: 20px;\">\n      <div style=\"mso-line-height-rule: exactly;mso-text-raise: 11px;vertical-align: middle;\">\n        <p class=\"size-18\" style=\"Margin-top: 0;Margin-bottom: 20px;font-family: Georgia,serif;font-size: 17px;line-height: 26px;\" lang=\"x-size-18\"><span class=\"font-georgia\" style=\"text-decoration: inherit;\"><strong>1. Evidence shows that the Georgian Dream&#8211;led government increasingly supports Iran.<\/strong><\/span><\/p>\n      <\/div>\n    <\/div>\n        \n            <div style=\"Margin-left: 20px;Margin-right: 20px;\">\n      <div style=\"mso-line-height-rule: exactly;mso-text-raise: 11px;vertical-align: middle;\">\n        <p class=\"size-15\" style=\"Margin-top: 0;Margin-bottom: 0;font-size: 15px;line-height: 23px;\" lang=\"x-size-15\">&#8220;We should look honestly at Georgian Dream as it supports the terrorist regime of Tehran. In February 2026, the Georgian Dream [deputy] foreign minister attended an Iranian embassy event celebrating the anniversary of the 1979 Iranian Revolution.&#8239;.&#8239;.&#8239;. Additionally, Tbilisi&#8217;s TV Tower was illuminated in Iranian flag colors.&#8239;.&#8239;.&#8239;. A Georgian Dream government representative grotesquely and revealingly signed a condolence book at the Iranian embassy, mourning the dictator Khamenei .&#8239;.&#8239;. in the very year that dictator Khamenei had killed 50,000 Iranian citizens.&#8239;.&#8239;.&#8239;. Georgian Dream has helped Iran in the current war by allowing strategic Russian airlifters to transit its airspace on route to Iran, \ncarrying supplies to help the Iranian regime.&#8221;<\/p><p class=\"size-15\" style=\"Margin-top: 20px;Margin-bottom: 20px;font-size: 15px;line-height: 23px;\" lang=\"x-size-15\">&#8212; Representative Joe Wilson (R-SC)<\/p>\n      <\/div>\n    <\/div>\n        \n            <div style=\"Margin-left: 20px;Margin-right: 20px;\">\n      <div style=\"mso-line-height-rule: exactly;line-height: 1px;font-size: 1px;\">&nbsp;<\/div>\n    <\/div>\n        \n          <\/div>\n        <!--[if mso]><\/td><\/tr><\/table><![endif]-->\n        <\/div>\n      <\/div>\n  \n      <div class=\"layout one-col fixed-width stack\" style=\"Margin: 0 auto;max-width: 600px;min-width: 320px; width: 320px;width: calc(28000% - 167400px);overflow-wrap: break-word;word-wrap: break-word;word-break: break-word;\">\n        <div class=\"layout__inner\" style=\"border-collapse: collapse;display: table;width: 100%;background-color: #dfe5e9;\">\n        <!--[if mso]><table align=\"center\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\"><tr class=\"layout-fixed-width\" style=\"background-color: #dfe5e9;\"><td style=\"width: 600px\" class=\"w560\"><![endif]-->\n          <div class=\"column\" style=\"text-align: left;color: #000;font-size: 14px;line-height: 21px;font-family: Georgia,serif;\">\n        \n            <div style=\"Margin-left: 20px;Margin-right: 20px;\">\n      <div style=\"mso-line-height-rule: exactly;mso-text-raise: 11px;vertical-align: middle;\">\n        <p class=\"size-18\" style=\"Margin-top: 0;Margin-bottom: 20px;font-family: Georgia,serif;font-size: 17px;line-height: 26px;\" lang=\"x-size-18\"><span class=\"font-georgia\" style=\"text-decoration: inherit;\"><strong>2. Insulate the US homeland from PRC robotics.<\/strong><\/span><\/p>\n      <\/div>\n    <\/div>\n        \n            <div style=\"Margin-left: 20px;Margin-right: 20px;\">\n      <div style=\"mso-line-height-rule: exactly;mso-text-raise: 11px;vertical-align: middle;\">\n        <p class=\"size-15\" style=\"Margin-top: 0;Margin-bottom: 0;font-size: 15px;line-height: 23px;\" lang=\"x-size-15\">&#8220;Many people have thought that Georgia&#8217;s slide away from the West, and the United States in particular, is just about Russia. And the message of this report&#8212;one of the messages that I and Luke hoped to put forth&#8212;is that that is not the case. This trajectory away from the civilized world has this Iranian dimension.&#8239;.&#8239;.&#8239;. For the last few years, the Islamic Republic of Iran has been able to find a comfortable environment in which it successfully built formidable influence infrastructure, which consists of whole ecosystem of organizations that, in this city or in other Western capitals, are regarded as [Islamic Revolutionary Guard Corps] fronts that the IRGC uses for recruitment of individuals in various countries and then \nsubsequently for operations, against the United States in particular.&#8221;<\/p><p class=\"size-15\" style=\"Margin-top: 20px;Margin-bottom: 20px;font-size: 15px;line-height: 23px;\" lang=\"x-size-15\">&#8212; Giorgi Kandelaki<\/p>\n      <\/div>\n    <\/div>\n        \n            <div style=\"Margin-left: 20px;Margin-right: 20px;\">\n      <div style=\"mso-line-height-rule: exactly;line-height: 1px;font-size: 1px;\">&nbsp;<\/div>\n    <\/div>\n        \n          <\/div>\n        <!--[if mso]><\/td><\/tr><\/table><![endif]-->\n        <\/div>\n      <\/div>\n  \n      <div class=\"layout one-col fixed-width stack\" style=\"Margin: 0 auto;max-width: 600px;min-width: 320px; width: 320px;width: calc(28000% - 167400px);overflow-wrap: break-word;word-wrap: break-word;word-break: break-word;\">\n        <div class=\"layout__inner\" style=\"border-collapse: collapse;display: table;width: 100%;background-color: #dfe5e9;\">\n        <!--[if mso]><table align=\"center\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\"><tr class=\"layout-fixed-width\" style=\"background-color: #dfe5e9;\"><td style=\"width: 600px\" class=\"w560\"><![endif]-->\n          <div class=\"column\" style=\"text-align: left;color: #000;font-size: 14px;line-height: 21px;font-family: Georgia,serif;\">\n        \n            <div style=\"Margin-left: 20px;Margin-right: 20px;\">\n      <div style=\"mso-line-height-rule: exactly;mso-text-raise: 11px;vertical-align: middle;\">\n        <p class=\"size-18\" style=\"Margin-top: 0;Margin-bottom: 20px;font-family: Georgia,serif;font-size: 17px;line-height: 26px;\" lang=\"x-size-18\"><span class=\"font-georgia\" style=\"text-decoration: inherit;\"><strong>3. Deny PRC access to critical US technologies.<\/strong><\/span><\/p>\n      <\/div>\n    <\/div>\n        \n            <div style=\"Margin-left: 20px;Margin-right: 20px;\">\n      <div style=\"mso-line-height-rule: exactly;mso-text-raise: 11px;vertical-align: middle;\">\n        <p class=\"size-15\" style=\"Margin-top: 0;Margin-bottom: 0;font-size: 15px;line-height: 23px;\" lang=\"x-size-15\">&#8220;So what can the Georgian Dream do? What should the United States expect this government to do? Firstly, [Tbilisi] needs to show that it wants to be America&#8217;s partner. I think the ball is very much in the Georgian Dream&#8217;s court right now. They have this idea that they are the populists, the MAGA of Georgia, and nothing could be further from the truth.&#8239;.&#8239;.&#8239;. So the first thing they need to do is demonstrate .&#8239;.&#8239;. that they&#8217;re serious about cracking down on this Iranian threat. You don&#8217;t have to go to the Iranian embassy to sign a condolence book, okay?&#8239;.&#8239;.&#8239;. But then I think we need to have a more visible crackdown on some of these networks that exist that are outlined in the report that Giorgi \njust mentioned .&#8239;.&#8239;. because this is not in America&#8217;s interest, and it&#8217;s not in Georgia&#8217;s interest as well.&#8221;<\/p><p class=\"size-15\" style=\"Margin-top: 20px;Margin-bottom: 0;font-size: 15px;line-height: 23px;\" lang=\"x-size-15\">&#8212; Luke Coffey&nbsp;<\/p><p class=\"size-15\" style=\"Margin-top: 20px;Margin-bottom: 20px;font-size: 15px;line-height: 23px;\" lang=\"x-size-15\"><a style=\"text-decoration: underline;transition: opacity 0.1s ease-in;color: #036359;\" href=\"https://hudsoninstitute.cmail19.com/t/i-l-zkytykt-idhlhlcju-o/\">Watch the event, listen to the podcast, or read the transcript here.<\/a><\/p>\n      <\/div>\n    <\/div>\n        \n            <div style=\"Margin-left: 20px;Margin-right: 20px;\">\n      <div style=\"mso-line-height-rule: exactly;line-height: 1px;font-size: 1px;\">&nbsp;<\/div>\n    <\/div>\n        \n          <\/div>\n        <!--[if mso]><\/td><\/tr><\/table><![endif]-->\n        <\/div>\n      <\/div>\n  \n      <div class=\"layout one-col fixed-width stack\" style=\"Margin: 0 auto;max-width: 600px;min-width: 320px; width: 320px;width: calc(28000% - 167400px);overflow-wrap: break-word;word-wrap: break-word;word-break: break-word;\">\n        <div class=\"layout__inner\" style=\"border-collapse: collapse;display: table;width: 100%;background-color: #dfe5e9;\">\n        <!--[if mso]><table align=\"center\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\"><tr class=\"layout-fixed-width\" style=\"background-color: #dfe5e9;\"><td style=\"width: 600px\" class=\"w560\"><![endif]-->\n          <div class=\"column\" style=\"text-align: left;color: #000;font-size: 14px;line- ><\/td><\/tr><\/table><\/td><\/tr><\/tbody><\/table><\/td><\/tr><\/tbody><\/table><table class=\"row row-7\" \nalign=\"center\" width=\"100%\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\" style=\"mso-table-lspace:0;mso-table-rspace:0\"><tbody><tr><td><table class=\"row-content stack\" align=\"center\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\" style=\"mso-table-lspace:0;mso-table-rspace:0;background-color:#fff;border-radius:0;color:#000;width:600px;margin:0 auto\" width=\"600\"><tbody><tr><td class=\"column column-1\" width=\"100%\" \nstyle=\"mso-table-lspace:0;mso-table-rspace:0;font-weight:400;text-align:left;vertical-align:top\"><table width=\"100%\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\" style=\"mso-table-lspace:0;mso-table-rspace:0\"><tr><td class=\"col-pad\" style=\"padding-bottom:10px\"><table class=\"divider_block block-1\" width=\"100%\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\" style=\"mso-table-lspace:0;mso-table-rspace:0\"><tr><td class=\"pad\" style=\"padding-bottom:10px\" align=\"center\">\n<table border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\" width=\"100%\" style=\"mso-table-lspace:0;mso-table-rspace:0\"><tr><td class=\"divider_inner\" style=\"font-size:1px;line-height:1px;border-top:1px solid #000\"><span style=\"word-break: break-word;\">&#8202;<\/span><\/td><\/tr><\/table><\/td><\/tr><\/table><table class=\"text_block block-2\" width=\"100%\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\" style=\"mso-table-lspace:0;mso-table-rspace:0;word-break:break-word\"><tr><td \nclass=\"pad\"><div style=\"font-family:Arial,sans-serif\"><div class style=\"font-family:seasonSans,Arial,sans-serif;font-size:12px;mso-line-height-alt:19.200000000000003px;color:#000;line-height:1.6\"><p style=\"margin:0;mso-line-height-alt:38.400000000000006px\"><span style=\"word-break: break-word; font-size: 24px;\"><strong>About Sebastian and Rebecca<\/strong><\/span><\/p><\/div><\/div><\/td><\/tr><\/table><\/td><\/tr><\/table><\/td><\/tr><\/tbody><\/table><\/td><\/tr><\/tbody><\/table><table class=\"row row-8\" \nalign=\"center\" width=\"100%\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\" style=\"mso-table-lspace:0;mso-table-rspace:0\"><tbody><tr><td><table class=\"row-content stack\" align=\"center\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\" style=\"mso-table-lspace:0;mso-table-rspace:0;color:#000;width:600px;margin:0 auto\" width=\"600\"><tbody><tr class=\"reverse\"><td class=\"column column-1 first\" width=\"100%\" \nstyle=\"mso-table-lspace:0;mso-table-rspace:0;font-weight:400;text-align:left;vertical-align:top\"><table width=\"100%\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\" style=\"mso-table-lspace:0;mso-table-rspace:0\"><tr><td class=\"col-pad\" style=\"padding-bottom:10px;padding-top:10px\"><table class=\"text_block block-1\" width=\"100%\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\" style=\"mso-table-lspace:0;mso-table-rspace:0;word-break:break-word\"><tr><td class=\"pad\" \nstyle=\"padding-bottom:10px\"><div style=\"font-family:Georgia,'Times New Roman',serif\"><div class style=\"font-family:Georgia,Times,'Times New Roman',serif;font-size:12px;mso-line-height-alt:19.200000000000003px;color:#000;line-height:1.6\"><p style=\"margin:0;font-size:16px;mso-line-height-alt:25.6px\">\n<span style=\"word-break: break-word; font-size: 16px;\"><strong>Sebastian Mallaby<\/strong> is the Paul A. Volcker senior fellow for international economics at CFR. A two-time Pulitzer Prize finalist, he is the author of six books, including <em>More Money Than God: Hedge Funds and the Making of a New Elite<\/em> and <em>The Power Law: Venture Capital and the Making of the New Future<\/em>, which have become investment classics. His latest book is <em>The Infinity Machine: Demis Hassabis, DeepMind, and the Quest for Superintelligence<\/em>; the <em>Financial Times<\/em> wrote that “Mallaby has done full justice to his kaleidoscopically interesting subject.” An experienced journalist and public speaker, Mallaby’s interests cover a wide variety of domestic and international issues, including the technology sector, central banks, financial markets, the implications of the rise of newly emerging powers, and the intersection of economics and international relations.&nbsp;\n<br><\/span><\/p><p style=\"margin:0;font-size:16px;mso-line-height-alt:19.200000000000003px\">&nbsp;<\/p><p style=\"margin:0;font-size:16px;mso-line-height-alt:25.6px\">\n<span style=\"word-break: break-word; font-size: 16px;\"><strong>Rebecca Patterson<\/strong> is a senior fellow at CFR. A globally recognized investor and macroeconomic researcher with more than twenty-five years of experience across the United States, Asia, and Europe, Patterson studies how politics and policy intersect with economic trends to drive financial markets. Through the Washington Speakers Bureau, she is also a frequently requested speaker on macroeconomic and financial market topics, where she provides actionable insights to a wide array of companies and industry organizations. Patterson is an independent director at Vanguard, a global asset manager overseeing more than $10 trillion in assets. Previously, she was the chief investment strategist for Bridgewater Associates, the world’s largest hedge fund. Patterson’s transition to finance came after several years working as a journalist, covering financial markets, policy, and politics in the United States and Europe.<\/span>\n<\/p><\/div><\/div><\/td><\/tr><\/table><table class=\"image_block block-2\" width=\"100%\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\" style=\"mso-table-lspace:0;mso-table-rspace:0\"><tr><td class=\"pad\" style=\"width:100%;padding-top:10px;padding-bottom:10px\" align=\"center\"><div class=\"fullWidth\" sty 99\">Hi there!&nbsp;&nbsp;<\/p>\n\n<p paraeid=\"{6805e74f-99e6-4ba2-bc61-ca9c6831025f}{198}\" paraid=\"569869066\">Thanks for subscribing to our&nbsp;newsletters.&nbsp;We&rsquo;re&nbsp;so glad&nbsp;you&rsquo;re&nbsp;here and&nbsp;look forward to sharing&nbsp;the Center&rsquo;s <a href=\"https://pewresearch.us1.list-manage.com/track/click?u=434f5d1199912232d416897e4&id=073a8976b6&e=939588bbb8\" rel=\"noreferrer noopener\" target=\"_blank\" style=\"text-decoration: underline;color: #346EAD;\">latest research<\/a> with you.&nbsp;<br>\n&nbsp;<br>\n<strong>What can you expect?<\/strong>&nbsp;These&nbsp;newsletters&nbsp;put&nbsp;fresh findings&nbsp;right at your fingertips to&nbsp;put the news of the day in context.&nbsp;We hope our work helps you feel informed when making decisions in your daily life.&nbsp;&nbsp;&nbsp;<\/p>\n\n<p paraeid=\"{db08e3c3-e5b8-46d1-a8b8-4906de2f953a}{17}\" paraid=\"1055034685\"><strong>What&nbsp;topics&nbsp;are you curious about?<\/strong>&nbsp;Check out our other&nbsp;newsletter products&nbsp;<a href=\"https://pewresearch.us1.list-manage.com/track/click?u=434f5d1199912232d416897e4&id=0d35904548&e=939588bbb8\" rel=\"noreferrer noopener\" target=\"_blank\" style=\"text-decoration: underline;color: #346EAD;\">on our website<\/a>.&nbsp;<br>\n<br>\n<strong>What&rsquo;s next?<\/strong>&nbsp;In addition to your newsletters,&nbsp;we&rsquo;re&nbsp;going to send you a few bonus emails over the next few days introducing you to our team and our research methods. We hope they help you understand the work that goes into our research findings.&nbsp;<br>\n&nbsp;<br>\nThanks, and happy reading!&nbsp;<br>\n&nbsp;<br>\nYour friends at Pew Research Center&nbsp;<\/p>\n\n<p paraeid=\"{db08e3c3-e5b8-46d1-a8b8-4906de2f953a}{67}\" paraid=\"2036512453\">&nbsp;<\/p>\n\n<p paraeid=\"{db08e3c3-e5b8-46d1-a8b8-4906de2f953a}{71}\" paraid=\"908024257\">P.S. (which stands for&nbsp;&ldquo;postscript&rdquo;&nbsp;&ndash;&nbsp;if you&nbsp;didn&rsquo;t&nbsp;know!)&nbsp;&nbsp;<\/p>\n\n<p paraeid=\"{db08e3c3-e5b8-46d1-a8b8-4906de2f953a}{102}\" paraid=\"1984759108\">To make sure our newsletters get to your inbox, add info@pewresearch.org to your contacts or safe senders list. If you use Gmail, just drag this email to your&nbsp;&ldquo;Primary&rdquo;&nbsp;tab. For other mail clients,&nbsp;<a href=\"https://pewresearch.us1.list-manage.com/track/click?u=434f5d1199912232d416897e4&id=f697ee2b5e&e=939588bbb8\" rel=\"noreferrer noopener\" target=\"_blank\" style=\"text-decoration: underline;color: #346EAD;\">check out these tips<\/a>.&nbsp;<\/p>\n<\/div><\/td><\/tr><\/tbody><\/table><table role=\"presentation\" style=\"border-collapse:collapse;border-spacing:0;padding:0;text-align:left;width:100%\"><tbody><tr style=\"padding:0;text-align:left\"><td height=\"30px\" style=\"Margin:0;color:#2a2a2a;font-family:Arial;font-size:30px;font-weight:400;hyphens:none!important;line-height:30px;margin:0;mso-line-height-rule:exactly;padding:0;text-align:left\">&#xA0;<\/td><\/tr><\/tbody><\/table><table role=\"presentation\" style=\"border-collapse:collapse;border-spacing:0;padding:0;text-align:left;width:100%\"><tbody><tr style=\"padding:0;text-align:left\"><td height=\"25px\" style=\"Margin:0;color:#2a2a2a;font-family:Arial;font-size:25px;font-weight:400;hyphens:none!important;line-height:25px;margin:0;mso-line-height-rule:exactly;padding:0;text-align:left\">&#xA0;<\/td><\/tr><\/tbody><\/table><hr style=\"border:#ccc .5px solid;margin:0;max-width:580px\"><table role=\"presentation\" style=\"border-collapse:collapse;border-spacing:0;padding:0;text-align:left;width:100%\"><tbody><tr style=\"padding:0;text-align:left\"><td height=\"25px\" style=\"Margin:0;color:#2a2a2a;font-family:Arial;font-size:25px;font-weight:400;hyphens:none!important;line-height:25px;margin:0;mso-line-height-rule:exactly;padding:0;text-align:left\">&#xA0;<\/td><\/tr><\/tbody><\/table><table role=\"presentation\" class=\"n\" style=\"border-collapse:collapse;border-spacing:0;display:table;padding: const EMBED = true;
let state = { q: "", topic: null, source: null, sort: "new" };

const $ = (s) => document.querySelector(s);
const feed = $("#feed");

// 建立側邊篩選
function buildFilters() {
  const topics = {}, sources = {};
  DATA.forEach(e => {
    topics[e.topic] = (topics[e.topic]||0)+1;
    sources[e.source] = (sources[e.source]||0)+1;
  });
  renderFilterGroup("#topicFilters", topics, "topic");
  renderFilterGroup("#sourceFilters", sources, "source");
}
function renderFilterGroup(sel, counts, key) {
  const box = $(sel);
  const all = document.createElement("button");
  all.className = "filter active"; all.dataset.key = key; all.dataset.val = "";
  all.innerHTML = `<span>全部</span><span class="n">${Object.values(counts).reduce((a,b)=>a+b,0)}</span>`;
  box.appendChild(all);
  Object.entries(counts).sort((a,b)=>b[1]-a[1]).forEach(([name, n]) => {
    const b = document.createElement("button");
    b.className = "filter"; b.dataset.key = key; b.dataset.val = name;
    b.innerHTML = `<span>${escapeHtml(name)}</span><span class="n">${n}</span>`;
    box.appendChild(b);
  });
  box.addEventListener("click", (ev) => {
    const btn = ev.target.closest(".filter"); if (!btn) return;
    state[key] = btn.dataset.val || null;
    box.querySelectorAll(".filter").forEach(x => x.classList.remove("active"));
    btn.classList.add("active");
    render();
  });
}

function escapeHtml(s) {
  return (s||"").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
}

function filtered() {
  let out = DATA.filter(e => {
    if (state.topic && e.topic !== state.topic) return false;
    if (state.source && e.source !== state.source) return false;
    if (state.q) {
      const hay = (e.subject + " " + e.source + " " + e.from_email + " " + e.excerpt).toLowerCase();
      if (!hay.includes(state.q.toLowerCase())) return false;
    }
    return true;
  });
  const s = state.sort;
  out.sort((a,b) => {
    if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
    if (s === "new") return b.date_sort - a.date_sort;
    if (s === "old") return a.date_sort - b.date_sort;
    if (s === "az")  return a.subject.localeCompare(b.subject, "zh-Hant");
    return 0;
  });
  return out;
}

function render() {
  const items = filtered();
  feed.innerHTML = "";
  if (!items.length) {
    feed.innerHTML = `<div class="empty">沒有符合條件的卷宗。<br>試著放寬搜尋或切換篩選。</div>`;
    return;
  }
  items.forEach((e, i) => {
    const art = document.createElement("article");
    art.className = "entry";
    art.style.animationDelay = Math.min(i * 0.04, 0.4) + "s";
    art.innerHTML = `
      <div class="topline">
        <span class="tag">${escapeHtml(e.topic)}</span>
        ${e.pinned ? '<span class="pin">★ 置頂</span>' : ''}
      </div>
      <h2>${escapeHtml(e.subject)}</h2>
      <div class="meta">
        <span class="src">${escapeHtml(e.source)}</span>
        <span class="dot"></span><span>${escapeHtml(e.date_label)}</span>
        <span class="dot"></span><span>約 ${e.minutes} 分鐘</span>
        ${e.has_body ? '' : '<span class="dot"></span><span class="nobody">僅存目</span>'}
      </div>
      <p class="excerpt">${escapeHtml(e.excerpt || "（此封信件沒有可預覽的內文）")}</p>
      ${e.has_body ? '<span class="more">閱讀全文</span>' : ''}`;
    art.addEventListener("click", () => openReader(e));
    feed.appendChild(art);
  });
}

// 閱讀面板
const readerBg = $("#readerBg"), reader = $("#reader");
function openReader(e) {
  $("#rTag").textContent = e.topic;
  $("#rTitle").textContent = e.subject;
  $("#rMeta").innerHTML =
    `<span>${escapeHtml(e.source)}</span>` +
    (e.from_email ? `<span>${escapeHtml(e.from_email)}</span>` : "") +
    `<span>${escapeHtml(e.date_label)}</span>`;
  const body = $("#rBody");
  if (!e.has_body) {
    body.innerHTML = `<div class="fallback">這封信件目前只有索引資料，沒有保存完整內文。</div>`;
  } else if (EMBED) {
    const f = document.createElement("iframe");
    f.setAttribute("sandbox", "allow-popups allow-popups-to-escape-sandbox");
    f.srcdoc = e.html;
    body.innerHTML = ""; body.appendChild(f);
  } else {
    const f = document.createElement("iframe");
    f.setAttribute("sandbox", "allow-popups allow-popups-to-escape-sandbox");
    f.src = e.rel_path;
    body.innerHTML = ""; body.appendChild(f);
  }
  readerBg.classList.add("open");
  reader.classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeReader() {
  readerBg.classList.remove("open");
  reader.classList.remove("open");
  document.body.style.overflow = "";
  setTimeout(() => { $("#rBody").innerHTML = ""; }, 420);
}
readerBg.addEventListener("click", closeReader);
$("#closeReader").addEventListener("click", closeReader);
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeReader(); });

$("#q").addEventListener("input", (e) => { state.q = e.target.value; render(); });
$("#sort").addEventListener("change", (e) => { state.sort = e.target.value; render(); });

buildFilters();
render();
</script>
